name: Tests

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "skins/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=scripts --cov-report=term-missing

      - name: Validate full catalog integrity
        run: python3 scripts/build_catalog.py --check-only

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
