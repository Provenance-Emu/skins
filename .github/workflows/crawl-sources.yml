name: Crawl External Sources

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 3am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no commits)"
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl sources
        id: crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          python3 scripts/crawl_sources.py \
            --sources sources.json \
            --existing-catalog docs/catalog.json \
            --output-dir skins/ \
            $ARGS

      - name: Create PR if new skins found
        if: steps.crawl.outputs.new_skin_count != '0' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(skins): bulk import from external sources (${{ steps.crawl.outputs.new_skin_count }} new)"
          branch: "crawl/weekly-${{ github.run_id }}"
          title: "chore(skins): weekly crawl — ${{ steps.crawl.outputs.new_skin_count }} new skin(s)"
          body: |
            Automated weekly crawl of external skin sources.

            **New skins found:** ${{ steps.crawl.outputs.new_skin_count }}

            Sources crawled are listed in `sources.json`. Please review for accuracy before merging.
          labels: "automated-pr,crawl"
          delete-branch: true

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 Crawl Sources workflow failed (run ${{ github.run_number }})" \
            --body "The **Crawl External Sources** workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** \`${{ github.event_name }}\`

          Please investigate the failed step in the run logs." \
            --assignee JoeMatt \
            --label "bug,workflow-failure"
