name: Crawl External Sources

on:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 3am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no commits)"
        type: boolean
        default: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl sources
        id: crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          python3 scripts/crawl_sources.py \
            --sources sources.json \
            --existing-catalog docs/catalog.json \
            --output-dir skins/ \
            $ARGS

      - name: Commit and push if new skins found
        if: steps.crawl.outputs.new_skin_count != '0' && inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skins/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore(skins): bulk import from external sources (${{ steps.crawl.outputs.new_skin_count }} new)"
          git pull --rebase origin main
          git push origin main

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 Crawl Sources workflow failed (run ${{ github.run_number }})" \
            --body "The **Crawl External Sources** workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** \`${{ github.event_name }}\`

          Please investigate the failed step in the run logs." \
            --assignee JoeMatt \
            --label "bug,workflow-failure"
