name: Generate Thumbnails

on:
  # Run after catalog crawl merges new skins, or manual skin JSON additions
  push:
    branches: [main]
    paths:
      - "skins/**/*.json"
      - "catalog.json"
  # Run on demand
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate even if thumbnail already set"
        type: boolean
        default: false
      limit:
        description: "Max skins to process (0 = all)"
        type: number
        default: 0
      no_release:
        description: "Skip GitHub Releases, use repo storage only"
        type: boolean
        default: false
      no_enhance:
        description: "Skip thumbnail enhancement (raw PNG, no bezel/crop/bars)"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for the commit step
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get install -y poppler-utils
          pip install pillow

      - name: Generate thumbnails
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ "${{ inputs.limit }}" != "0" ] && [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          if [ "${{ inputs.no_release }}" = "true" ]; then ARGS="$ARGS --no-release"; fi
          if [ "${{ inputs.no_enhance }}" = "true" ]; then ARGS="$ARGS --no-enhance"; fi

          python3 scripts/generate_thumbnails.py \
            --skins-dir skins/ \
            --thumbnails-dir thumbnails/ \
            $ARGS

      - name: Rebuild catalog with updated thumbnail URLs
        if: steps.generate.outputs.updated != '0'
        run: |
          python3 scripts/build_catalog.py --output docs/catalog.json
          cp docs/catalog.json catalog.json

      - name: Generate system landing pages
        if: steps.generate.outputs.updated != '0'
        run: python3 scripts/generate_system_pages.py

      - name: Generate author pages
        if: steps.generate.outputs.updated != '0'
        run: python3 scripts/generate_author_pages.py

      - name: Generate sitemap
        if: steps.generate.outputs.updated != '0'
        run: python3 scripts/generate_sitemap.py

      - name: Generate RSS feed
        if: steps.generate.outputs.updated != '0'
        run: python3 scripts/generate_rss.py

      - name: Commit thumbnails and updated JSONs
        if: steps.generate.outputs.updated != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage thumbnails + skin JSONs first so new (untracked) files are
          # included in the stash — git stash push pathspec only captures tracked
          # changes, so we must stage them explicitly first.
          git add thumbnails/ skins/
          # Stash ONLY thumbnails + skin JSONs using pathspec.
          # All other generated files (catalog, author pages, system pages, etc.)
          # are discarded — they will be regenerated fresh after rebase to avoid
          # merge conflicts when upstream changes those templates.
          git stash push -- thumbnails/ skins/
          # Discard any remaining generated artifacts (catalog, docs/*)
          git checkout -- .
          # Sync with any concurrent pushes
          git fetch origin main
          git rebase origin/main
          # Restore thumbnails/skins on top of rebased HEAD
          git stash pop
          # Regenerate all derived artifacts from the now-current scripts
          python3 scripts/build_catalog.py --output docs/catalog.json
          cp docs/catalog.json catalog.json
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore(thumbnails): generate ${{ steps.generate.outputs.updated }} skin thumbnail(s) [skip ci]"
          git pull --rebase origin main
          git push origin main
