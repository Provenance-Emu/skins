name: Build Catalog & Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "skins/**"
      - "docs/**"
      - "scripts/build_catalog.py"
      - "scripts/skin_schema.py"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build catalog.json
        run: |
          python3 scripts/build_catalog.py --output docs/catalog.json
          # Also write to repo root so the app can fetch via raw.githubusercontent.com/…/main/catalog.json
          cp docs/catalog.json catalog.json

      - name: Commit updated catalog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild catalog.json [skip ci]"
          file_pattern: docs/catalog.json catalog.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
