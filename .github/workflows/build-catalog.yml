name: Build Catalog & Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "skins/**"
      - "docs/**"
      - "scripts/build_catalog.py"
      - "scripts/skin_schema.py"
      - "scripts/generate_system_pages.py"
      - "scripts/generate_author_pages.py"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build catalog.json
        run: |
          python3 scripts/build_catalog.py --output docs/catalog.json
          # Also write to repo root so the app can fetch via raw.githubusercontent.com/…/main/catalog.json
          cp docs/catalog.json catalog.json

      - name: Generate static system & author pages
        run: |
          python3 scripts/generate_system_pages.py
          python3 scripts/generate_author_pages.py

      - name: Inject cache-busting hashes into HTML
        run: |
          CSS_VER=$(md5sum docs/style.css | cut -c1-8)
          JS_VER=$(md5sum docs/js/browse.js | cut -c1-8)
          # Idempotent: replaces existing ?v=... or bare filename
          sed -i "s|href=\"style\.css[^\"]*\"|href=\"style.css?v=$CSS_VER\"|g" docs/index.html docs/submit.html
          sed -i "s|src=\"js/browse\.js[^\"]*\"|src=\"js/browse.js?v=$JS_VER\"|g" docs/index.html
          echo "CSS hash: $CSS_VER  JS hash: $JS_VER"

      - name: Commit updated catalog and generated pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild catalog + static pages [skip ci]"
          file_pattern: docs/catalog.json catalog.json docs/systems/ docs/authors/ docs/index.html docs/submit.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
