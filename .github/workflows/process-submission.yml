name: Process Skin Submission

on:
  issues:
    types: [opened, labeled]

jobs:
  process:
    # Trigger on new issues with the submit template, or when 'skin-submission' label is added
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'skin-submission') ||
      (github.event.action == 'opened' && contains(github.event.issue.body, '### Skin URL'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add processing label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['processing']
            });

      - name: Extract submission URL from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Match ### Skin URL\n<url> or ### Repo URL\n<url>
            const urlMatch = body.match(/###\s+(?:Skin|Repo|Metadata)\s+URL\s*\n+([^\s\n]+)/i);
            const url = urlMatch ? urlMatch[1].trim() : '';
            const submitter = context.payload.issue.user.login;
            core.setOutput('url', url);
            core.setOutput('submitter', submitter);
            if (!url) {
              core.setFailed('Could not extract URL from issue body');
            }

      - name: Process submission
        id: process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/process_submission.py \
            "${{ steps.extract.outputs.url }}" \
            --output-dir skins/ \
            --github-token "$GITHUB_TOKEN" \
            --submitted-by "${{ steps.extract.outputs.submitter }}"

      - name: Commit and push
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skins/
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit"
          else
            git commit -m "feat(skins): add submission from issue #${{ github.event.issue.number }}"
            git pull --rebase origin main
            git push origin main
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close issue and comment
        uses: actions/github-script@v7
        with:
          script: |
            const pushed = '${{ steps.push.outputs.pushed }}' === 'true';
            const body = pushed
              ? `✅ **Submission processed and merged!** The skin has been added to the catalog.`
              : `⚠️ Submission was processed but no new skins were found (they may already be in the catalog).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            // Remove processing label, add submitted
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'processing'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['submitted']
            });
            if (pushed) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Submission failed to process.**\n\nPlease check that:\n- The URL is publicly accessible\n- It points to a \`.deltaskin\`, \`.manicskin\`, GitHub repo, or GitHub release\n\nSee the [workflow logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions) for details, or submit a manual PR.`
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'processing'
            }).catch(() => {});
