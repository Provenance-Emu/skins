name: Process Skin Submission

on:
  issues:
    types: [opened, labeled]

jobs:
  process:
    # Trigger on new issues with the submit template, or when 'skin-submission' label is added
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'skin-submission') ||
      (github.event.action == 'opened' && contains(github.event.issue.body, '### Skin URL'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add processing label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['processing']
            });

      - name: Extract submission URL from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            // Match ### Skin URL\n<url> or ### Repo URL\n<url>
            const urlMatch = body.match(/###\s+(?:Skin|Repo|Metadata)\s+URL\s*\n+([^\s\n]+)/i);
            const url = urlMatch ? urlMatch[1].trim() : '';
            const submitter = context.payload.issue.user.login;
            core.setOutput('url', url);
            core.setOutput('submitter', submitter);
            if (!url) {
              core.setFailed('Could not extract URL from issue body');
            }

      - name: Process submission
        id: process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/process_submission.py \
            "${{ steps.extract.outputs.url }}" \
            --output-dir skins/ \
            --github-token "$GITHUB_TOKEN" \
            --submitted-by "${{ steps.extract.outputs.submitter }}"

      - name: Create pull request
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: skins/
          commit-message: "feat(skins): add submission from issue #${{ github.event.issue.number }}"
          branch: "submission/issue-${{ github.event.issue.number }}"
          title: "feat(skins): add skin(s) from issue #${{ github.event.issue.number }}"
          body: |
            Automated submission from issue #${{ github.event.issue.number }}
            Submitted by @${{ steps.extract.outputs.submitter }}

            **Source URL:** ${{ steps.extract.outputs.url }}

            Closes #${{ github.event.issue.number }}
          labels: "skin-submission,automated-pr"

      - name: Comment on issue with PR link
        uses: actions/github-script@v7
        with:
          script: |
            const prUrl = '${{ steps.pr.outputs.pull-request-url }}';
            const prNumber = '${{ steps.pr.outputs.pull-request-number }}';
            const body = prUrl
              ? `✅ **Submission processed!** A pull request has been created: ${prUrl}\n\nA maintainer will review and merge it shortly.`
              : `⚠️ Submission was processed but no new skins were found (they may already be in the catalog).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
            // Remove processing label, add submitted
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'processing'
            }).catch(() => {});
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['submitted']
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Submission failed to process.**\n\nPlease check that:\n- The URL is publicly accessible\n- It points to a \`.deltaskin\`, \`.manicskin\`, GitHub repo, or GitHub release\n\nSee the [workflow logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions) for details, or submit a manual PR.`
            });
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'processing'
            }).catch(() => {});
